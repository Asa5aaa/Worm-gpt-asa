<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asan2tm-gpt | Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1128;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Login */
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: #0f172a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            text-align: center;
        }
        .login-box h1 { color: #4fc3f7; margin-bottom: 5px; font-size: 24px; }
        .login-box p { color: #90a4ae; margin-bottom: 25px; font-size: 13px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1c2541;
            border: 1px solid #2a3a5c;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .login-box input:focus { border-color: #4fc3f7; }
        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-box button:hover { background: #1976d2; }
        .error { color: #ef5350; margin-top: 10px; font-size: 13px; display: none; }

        /* Header */
        .header {
            background: #0f172a;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #1e293b;
        }
        .header h2 { color: #4fc3f7; font-size: 20px; }
        .header .status { font-size: 13px; font-weight: bold; padding: 6px 14px; border-radius: 20px; }
        .status.active { background: #1b5e20; color: #aed581; }
        .status.shutdown { background: #b71c1c; color: #ef9a9a; }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-blue { background: #1565c0; }
        .btn-green { background: #2e7d32; }
        .btn-red { background: #c62828; }
        .btn-orange { background: #e65100; }
        .btn-teal { background: #00838f; }
        .btn-sm { padding: 7px 14px; font-size: 12px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; }

        /* Table */
        .table-container {
            background: #0f172a;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #1e293b;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }
        th {
            background: #1c2541;
            color: #90a4ae;
            padding: 12px 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #1a2744;
            white-space: nowrap;
        }
        tr:hover { background: rgba(79, 195, 247, 0.05); }
        .expired { color: #ef5350; font-weight: bold; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-normal { background: #37474f; color: #ff8a65; }
        .badge-pro { background: #0d47a1; color: #4fc3f7; }
        .badge-proplus { background: #1b5e20; color: #aed581; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: #0f172a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { color: #4fc3f7; margin-bottom: 20px; }
        .modal label { display: block; margin-top: 12px; color: #90a4ae; font-size: 12px; }
        .modal input, .modal select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #1c2541;
            border: 1px solid #2a3a5c;
            color: white;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        .modal input:focus, .modal select:focus { border-color: #4fc3f7; }
        .modal .btn-row { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1b5e20;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(80px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .btn { padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
    <h1>asan2tm-gpt</h1>
    <p>Admin Panel</p>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <p class="error" id="loginError">Invalid username or password!</p>
</div>

<!-- MAIN PANEL -->
<div id="mainPanel" class="container" style="display:none;">

    <!-- Header -->
    <div class="header">
        <h2>⚙️ Admin Panel</h2>
        <span id="systemStatus" class="status active">🟢 System: ACTIVE</span>
        <div>
            <button class="btn btn-teal btn-sm" onclick="loadFromGitHub()">📥 Load from GitHub</button>
            <button class="btn btn-blue btn-sm" onclick="downloadJSON()">📤 Download users.json</button>
            <button class="btn btn-orange btn-sm" onclick="showAddModal()">➕ Add User</button>
        </div>
        <div>
            <button class="btn btn-red btn-sm" onclick="shutdownAll()">🔴 Shutdown All</button>
            <button class="btn btn-green btn-sm" onclick="startAll()">🟢 Start All</button>
            <button class="btn btn-sm" style="background:#b71c1c;color:white;" onclick="doLogout()">🚪 Exit</button>
        </div>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>📧 Email</th>
                    <th>🔑 Password</th>
                    <th>⭐ Subscription</th>
                    <th>📅 Expiry</th>
                    <th>💻 Device ID</th>
                    <th>✅ Active</th>
                    <th>⚡ Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr><td colspan="7" style="color:#546e7a;padding:30px;">Click "Load from GitHub" to view users</td></tr>
            </tbody>
        </table>
    </div>
    <p style="text-align:center;color:#546e7a;margin-top:10px;font-size:11px;">
        👥 Users: <span id="userCount">0</span> | Data stored in browser memory until downloaded
    </p>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="userModal">
    <div class="modal">
        <h3 id="modalTitle">➕ Add User</h3>
        <input type="hidden" id="modalEditEmail">
        <label>Email:</label>
        <input type="email" id="modalEmail" placeholder="user@example.com">
        <label>Password:</label>
        <input type="text" id="modalPassword" placeholder="Password">
        <label>Subscription:</label>
        <select id="modalSubscription">
            <option value="normal">Normal</option>
            <option value="pro">Pro</option>
            <option value="pro_plus">Pro Plus</option>
        </select>
        <label>Duration (days):</label>
        <input type="number" id="modalDays" value="30" min="1">
        <label>Device ID (optional):</label>
        <input type="text" id="modalDevice" placeholder="Leave empty if not set">
        <div class="btn-row">
            <button class="btn btn-sm" style="background:#37474f;color:white;" onclick="closeModal()">Cancel</button>
            <button class="btn btn-green btn-sm" onclick="saveUser()">💾 Save</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==================== CONFIG ====================
const ADMIN_USER = "asa";
const ADMIN_PASS = "asa";
const GITHUB_RAW_URL = "https://raw.githubusercontent.com/Asa5aaa/Worm-gpt-asa/main/users.json";

// ==================== STATE ====================
let users = [];
let systemActive = true;
let isLoggedIn = false;

// ==================== LOGIN ====================
function doLogin() {
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPass").value.trim();
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        isLoggedIn = true;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPanel").style.display = "block";
        document.getElementById("loginError").style.display = "none";
        showToast("✅ Welcome, Admin!");
    } else {
        document.getElementById("loginError").style.display = "block";
    }
}

function doLogout() {
    isLoggedIn = false;
    users = [];
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("mainPanel").style.display = "none";
    document.getElementById("loginUser").value = "";
    document.getElementById("loginPass").value = "";
}

// ==================== GITHUB ====================
async function loadFromGitHub() {
    if (!isLoggedIn) return;
    showToast("⏳ Loading from GitHub...");
    try {
        const resp = await fetch(GITHUB_RAW_URL, { cache: "no-cache" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        users = data.users || [];
        systemActive = data.system_active !== undefined ? data.system_active : true;
        renderTable();
        showToast(`✅ Loaded ${users.length} users from GitHub!`);
    } catch (e) {
        showToast("❌ Cannot connect to GitHub. Check your internet.");
        console.error(e);
    }
}

// ==================== RENDER ====================
function renderTable() {
    const tbody = document.getElementById("userTableBody");
    document.getElementById("userCount").textContent = users.length;
    
    const statusEl = document.getElementById("systemStatus");
    if (systemActive) {
        statusEl.textContent = "🟢 System: ACTIVE";
        statusEl.className = "status active";
    } else {
        statusEl.textContent = "🔴 System: SHUTDOWN";
        statusEl.className = "status shutdown";
    }

    if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:#546e7a;padding:30px;">No users found. Click "Add User" to create one.</td></tr>';
        return;
    }

    let html = "";
    users.forEach((user, index) => {
        const subBadge = user.subscription === "pro_plus" ? "badge-proplus" : 
                        user.subscription === "pro" ? "badge-pro" : "badge-normal";
        const subLabel = user.subscription === "pro_plus" ? "Pro Plus" : 
                        user.subscription === "pro" ? "Pro" : "Normal";
        
        let expiryDisplay = "Not set";
        if (user.expiry_date) {
            const expiry = new Date(user.expiry_date);
            const now = new Date();
            const daysLeft = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
            expiryDisplay = daysLeft < 0 ? 
                `<span class="expired">⚠️ EXPIRED (${user.expiry_date})</span>` : 
                `${user.expiry_date} (${daysLeft}d left)`;
        }
        
        const device = user.device_id ? user.device_id.substring(0, 32) : "Not set";
        const active = user.active !== false ? "✅ Yes" : "❌ No";
        
        html += `
            <tr>
                <td>${user.email}</td>
                <td>${user.password}</td>
                <td><span class="badge ${subBadge}">${subLabel}</span></td>
                <td>${expiryDisplay}</td>
                <td style="font-size:10px;font-family:monospace;">${device}</td>
                <td>${active}</td>
                <td>
                    <button class="btn btn-blue btn-xs" onclick="showEditModal('${user.email}')">✏️</button>
                    <button class="btn btn-orange btn-xs" onclick="toggleActive('${user.email}')">⏻</button>
                    <button class="btn btn-teal btn-xs" onclick="setDevice('${user.email}')">📱</button>
                    <button class="btn btn-red btn-xs" onclick="deleteUser('${user.email}')">🗑</button>
                </td>
            </tr>`;
    });
    tbody.innerHTML = html;
}

// ==================== MODAL ====================
function showAddModal() {
    document.getElementById("modalTitle").textContent = "➕ Add User";
    document.getElementById("modalEditEmail").value = "";
    document.getElementById("modalEmail").value = "";
    document.getElementById("modalPassword").value = "";
    document.getElementById("modalSubscription").value = "normal";
    document.getElementById("modalDays").value = "30";
    document.getElementById("modalDevice").value = "";
    document.getElementById("userModal").style.display = "flex";
}

function showEditModal(email) {
    const user = users.find(u => u.email === email);
    if (!user) return;
    document.getElementById("modalTitle").textContent = "✏️ Edit User";
    document.getElementById("modalEditEmail").value = email;
    document.getElementById("modalEmail").value = user.email;
    document.getElementById("modalPassword").value = user.password;
    document.getElementById("modalSubscription").value = user.subscription || "normal";
    document.getElementById("modalDays").value = "0"; // Not used for edit
    document.getElementById("modalDevice").value = user.device_id || "";
    document.getElementById("userModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("userModal").style.display = "none";
}

function saveUser() {
    const editEmail = document.getElementById("modalEditEmail").value;
    const email = document.getElementById("modalEmail").value.trim();
    const password = document.getElementById("modalPassword").value.trim();
    const subscription = document.getElementById("modalSubscription").value;
    const days = parseInt(document.getElementById("modalDays").value) || 30;
    const deviceId = document.getElementById("modalDevice").value.trim();

    if (!email || !password) {
        showToast("❌ Email and Password are required!");
        return;
    }

    if (editEmail) {
        // Edit existing
        const user = users.find(u => u.email === editEmail);
        if (user) {
            user.email = email;
            user.password = password;
            user.subscription = subscription;
            user.device_id = deviceId || null;
            showToast("✅ User updated! (Don't forget to Download & Upload)");
        }
    } else {
        // Add new
        if (users.find(u => u.email === email)) {
            showToast("❌ This email already exists!");
            return;
        }
        const expiryDate = new Date();
        expiryDate.setDate(expiryDate.getDate() + days);
        users.push({
            email: email,
            password: password,
            subscription: subscription,
            expiry_date: expiryDate.toISOString().split("T")[0],
            device_id: deviceId || null,
            active: true,
            created_at: new Date().toISOString()
        });
        showToast("✅ User added! (Don't forget to Download & Upload)");
    }

    renderTable();
    closeModal();
}

// ==================== ACTIONS ====================
function toggleActive(email) {
    const user = users.find(u => u.email === email);
    if (user) {
        user.active = !(user.active !== false);
        renderTable();
        showToast(`User ${email}: ${user.active ? 'ACTIVATED ✅' : 'DEACTIVATED ❌'}`);
    }
}

function setDevice(email) {
    const user = users.find(u => u.email === email);
    if (!user) return;
    const newDevice = prompt(`Set Device ID for ${email}:`, user.device_id || "");
    if (newDevice !== null) {
        user.device_id = newDevice.trim() || null;
        renderTable();
        showToast(`Device ID updated for ${email}`);
    }
}

function deleteUser(email) {
    if (confirm(`⚠️ Delete user "${email}"?\nThis cannot be undone!`)) {
        users = users.filter(u => u.email !== email);
        renderTable();
        showToast(`🗑 User "${email}" deleted!`);
    }
}

function shutdownAll() {
    if (confirm("⚠️ SHUTDOWN ALL USERS?\nThey will not be able to login.")) {
        systemActive = false;
        renderTable();
        showToast("🔴 System SHUTDOWN! Download and upload to apply.");
    }
}

function startAll() {
    systemActive = true;
    renderTable();
    showToast("🟢 System ACTIVATED! Download and upload to apply.");
}

// ==================== DOWNLOAD ====================
function downloadJSON() {
    const data = {
        users: users,
        system_active: systemActive,
        last_updated: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "users.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("📤 users.json downloaded! Upload it to GitHub.");
}

// ==================== TOAST ====================
function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.display = "block";
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => { toast.style.display = "none"; }, 3000);
}

// ==================== KEYBOARD SHORTCUT ====================
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeModal();
    if (document.getElementById("loginPage").style.display !== "none" && e.key === "Enter") doLogin();
});
</script>

</body>
</html>
